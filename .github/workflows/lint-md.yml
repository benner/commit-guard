---
name: Lint Markdown
on:  # yamllint disable-line rule:truthy
  pull_request:
permissions:
  contents: read
jobs:
  lint-md:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Lint Markdown files with reviewdog
        # yamllint disable-line rule:line-length
        uses: reviewdog/action-markdownlint@3667398db9118d7e78f7a63d10e26ce454ba5f58  # v0.26.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: info
          fail_level: any
  lint-md-rumdl:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Set up uv
        # yamllint disable-line rule:line-length
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: false
      - name: Set up reviewdog
        # yamllint disable-line rule:line-length
        uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f  # ratchet:reviewdog/action-setup@v1
      - name: Lint Markdown files with rumdl via reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |-
          uvx rumdl check . --output-format json-lines > rumdl.jsonl || true
          jq -c '
            {
              source: {name: "rumdl"},
              severity: (.severity | ascii_upcase),
              message: .message,
              location: {
                path: .file,
                range: {start: {line: .line, column: .column}}
              },
              code: {value: .rule}
            }
          ' rumdl.jsonl \
            | reviewdog \
                -f=rdjsonl \
                -name=rumdl \
                -reporter=github-pr-review \
                -filter-mode=added \
                -fail-level=any
